{% extends "base.html" %}
{% block title %}Round {{ round_num }} {{ role }} — Project #{{ project_id }}{% endblock %}
{% block content %}
<header class="project-header">
  <h1>📄 Round {{ round_num }} — {{ role|title }}</h1>
  <p class="project-meta">
    <a href="{{ url_for('project_view', project_id=project_id) }}">← back to project</a>
  </p>
</header>
<pre class="memory-view">{{ content }}</pre>
{% endblock %}
