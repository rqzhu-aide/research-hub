# Research Hub Configuration
# User defines 3-4 Hermes profiles here. The hub orchestrates workflows across them.

hub:
  name: "My Research Hub"
  workspace_dir: "~/research"    # where projects + database live (separate from app)
  # projects:    ~/research/projects/project-NNN-<slug>/
  # database:    ~/research/hub.db
  max_iterations: 10

# Define your agent profiles here (must already exist in Hermes)
# Role id == profile name (so role references in phases map directly to Hermes profiles)
# NOTE: model/provider live in each profile's own config.yaml — not here.
#       The profiles page reads them live from ~/.hermes/profiles/<name>/config.yaml
agents:
- id: "research_lead"
  profile: "research_lead"
  name: "Research Lead"
  role: "domain, framing, writing"

- id: "theorist"
  profile: "theorist"
  name: "Theorist"
  role: "methods, math, rigor"

- id: "data_scientist"
  profile: "data_scientist"
  name: "Data Scientist"
  role: "implementation, data, reproducibility"

- id: "paper_reviewer"
  profile: "paper_reviewer"
  name: "Paper Reviewer"
  role: "independent quality check (on-demand)"

# ─────────────────────────────────────────────────────────────────────
# Phase definitions
#
# The research_lead orchestrates every phase. It reads the situation, picks
# tasks from the playbook (config/phases/<slug>/*.md), and assigns them to
# members. What's declared here is METADATA — the lead treats it as guidance,
# not a rigid script.
#
# Fields:
#   slug        — phase identifier (NN-name), used everywhere
#   name        — display name
#   description — one-line summary
#   pattern     — suggested interaction style (lead may adapt):
#                   parallel   = members work independently, lead merges
#                   sequential = pipeline A→B→C, each takes previous as input
#                   debate     = owner proposes, critics critique, repeat
#   gated_by    — phases that must reach 'completed' before this can start
#                   empty list = runnable at any time
#   folder      — where this phase's outputs land (relative to project root)
#   members     — roles that participate; FIRST is the primary contributor
#
# Note: there is no "modes" field. Every phase has one run machinery; the
# research_lead adapts per-run direction by reading project state and the
# user's feedback. See config/phases/<slug>/_lead.md for the lead's playbook.
# ─────────────────────────────────────────────────────────────────────
phases:
- slug: "01-literature-review"
  name: "Literature Review"
  description: "Survey and organize relevant literature"
  pattern: parallel
  gated_by: []
  folder: "references/"
  members: [research_lead, theorist, data_scientist]

- slug: "02-method-development"
  name: "Method Development"
  description: "Design and specify the proposed method"
  pattern: debate
  gated_by: ["01-literature-review"]
  folder: "ideas/"
  members: [theorist, research_lead, data_scientist]

- slug: "03-theoretical-justification"
  name: "Theoretical Justification"
  description: "Develop proofs, bounds, and guarantees"
  pattern: sequential
  gated_by: ["02-method-development"]
  folder: "draft/theory/"
  members: [theorist, research_lead]

- slug: "04-numerical-validation"
  name: "Numerical Validation"
  description: "Implement, test, and validate numerically"
  pattern: sequential
  gated_by: ["02-method-development"]
  folder: "numerical/"
  members: [data_scientist, theorist, research_lead]

- slug: "05-data-analysis"
  name: "Data Analysis"
  description: "Analyze results and interpret findings"
  pattern: debate
  gated_by: ["04-numerical-validation"]
  folder: "draft/analysis/"
  members: [theorist, research_lead, data_scientist]

- slug: "06-paper-writing"
  name: "Paper Writing"
  description: "Compile findings into manuscript"
  pattern: sequential
  gated_by: ["05-data-analysis"]
  folder: "draft/"
  members: [research_lead, theorist, data_scientist, paper_reviewer]
