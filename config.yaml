# Research Hub Configuration
# User defines 3-4 Hermes profiles here. The hub orchestrates workflows across them.

hub:
  name: "My Research Hub"
  workspace_dir: "~/research"    # where projects + database live (separate from app)
  # projects:    ~/research/projects/project-NNN-<slug>/
  # database:    ~/research/hub.db
  run_timeout_minutes: 120
# Phase runs are explicitly started by the user. This permits the lead to
# execute the project-local tools needed by Hermes after that decision.
  allow_unattended_tools: true

# Define your agent profiles here (must already exist in Hermes)
# Role id == profile name (so role references in phases map directly to Hermes profiles)
# NOTE: model/provider live in each profile's own config.yaml, not here.
#       The profiles page reads them live from ~/.hermes/profiles/<name>/config.yaml
agents:
- id: "research_lead"
  profile: "research_lead"
  name: "Research Lead"
  role: "scientific question, framing, synthesis"

- id: "theorist"
  profile: "theorist"
  name: "Theorist"
  role: "statistical theory, assumptions, proofs"

- id: "data_scientist"
  profile: "data_scientist"
  name: "Data Analyst"
  role: "implementation, numerical studies, data analysis"

- id: "paper_reviewer"
  profile: "paper_reviewer"
  name: "Paper Reviewer"
  role: "independent scientific assessment"

# ---------------------------------------------------------------------------
# Phase definitions
#
# The user explicitly starts every run. The research_lead then executes only
# that run's configured plan, submits a summary for review, and stops. Neither
# completion nor approval starts another phase.
#
# Fields:
#   slug: phase identifier (NN-name), used everywhere
#   name: display name
#   description: one-line summary
#   pattern: exact interaction structure for the run
#     parallel: members investigate independently, then the lead synthesizes
#     sequential: fixed ordered handoffs, with each stage reading the prior one
#     debate: independent proposals followed by configured comparison rounds
#   gated_by: recommended approved, current prerequisites. The user may proceed
#     with an explicit recorded override when one is missing or stale.
#   context_from: additional approved context to include when current. These
#     phases are useful inputs, not prerequisites.
#   folder: where this phase's run outputs are written, relative to the project
#   members: roles that may participate in the configured plan
#   rounds: allowed/default depth for parallel and debate work
#   stages: exact ordered handoffs for sequential work
#   available_run_plans: explicit Web UI plans for a phase with supported
#     user-selected variants
#
# There is no "modes" field. User direction may change the research focus, but
# it cannot add, skip, reorder, or automatically start configured phases.
# ---------------------------------------------------------------------------
phases:
- slug: "01-literature-review"
  name: "Literature Review"
  description: "Assess direct prior work, theoretical foundations, related methods, existing implementations, and originality"
  pattern: parallel
  gated_by: []
  folder: "references/literature-review/"
  members: [research_lead, theorist, data_scientist]
  rounds: {min: 1, default: 2, max: 5}

- slug: "02-method-development"
  name: "Method Development"
  description: "Define the estimand and method, then specify validity conditions and results that would contradict its stated properties"
  pattern: debate
  gated_by: ["01-literature-review"]
  folder: "ideas/"
  members: [theorist, research_lead, data_scientist]
  rounds: {min: 2, default: 2, max: 3}

- slug: "03-theoretical-justification"
  name: "Theoretical Analysis"
  description: "Derive theoretical results and state their assumptions, scope, and limitations"
  pattern: sequential
  gated_by: ["02-method-development"]
  folder: "draft/theory/"
  members: [theorist, research_lead, paper_reviewer]
  proof_audit:
    plans: [standard, standard_with_audit, audit_only]
    stage:
      role: paper_reviewer
      name: "Audit the final theoretical analysis independently"
      description: "Check the exact sealed theory artifact, assumptions, proof dependencies, and central conclusions without revising the theory."
  rounds: {min: 3, default: 3, max: 3}
  stages:
  - role: theorist
    name: "Develop the theory"
    description: "Develop the necessary results, their dependencies, assumptions, scope, and proofs."
  - role: research_lead
    name: "Assess theoretical support"
    description: "Assess how the results support the claims, including scope and unresolved gaps."
  - role: theorist
    name: "Revise the analysis"
    description: "Revise the analysis where needed and state any unresolved mathematical questions explicitly."

- slug: "04-numerical-validation"
  name: "Numerical Validation"
  description: "Verify that the implementation matches the method and assess prespecified statistical properties and empirical performance"
  pattern: sequential
  gated_by: ["02-method-development"]
  context_from: ["03-theoretical-justification"]
  folder: "numerical/"
  members: [data_scientist, theorist, research_lead]
  rounds: {min: 4, default: 4, max: 4}
  stages:
  - role: data_scientist
    name: "Prespecify the protocol, then test"
    description: "Complete the protocol-only task in its isolated run workspace; after Research Hub verifies and seals that workspace, complete the separate result task by implementing the method and testing failure cases first."
  - role: theorist
    name: "Audit mathematical and computational correspondence"
    description: "Verify the sealed protocol file hashes, then audit whether the implementation and protocol correspond to the method and scientific design."
  - role: data_scientist
    name: "Correct and validate"
    description: "Write versioned corrections for implementation or protocol discrepancies within the scientific design, preserve the sealed originals, and complete the numerical study."
  - role: research_lead
    name: "Synthesize the evidence"
    description: "Synthesize the submitted evidence for each prespecified statement without redefining the study or running additional analyses."

- slug: "05-data-analysis"
  name: "Scientific Interpretation"
  description: "Interpret the numerical results, uncertainty, and validity checks and determine the scope of each scientific conclusion"
  pattern: debate
  gated_by: ["04-numerical-validation"]
  context_from: ["03-theoretical-justification"]
  folder: "draft/analysis/"
  members: [theorist, research_lead, data_scientist]
  rounds: {min: 2, default: 2, max: 3}

- slug: "06-paper-writing"
  name: "Paper Writing"
  description: "Write and independently assess a manuscript consistent with the theory and evidence"
  pattern: sequential
  gated_by: ["03-theoretical-justification", "05-data-analysis"]
  folder: "draft/"
  members: [research_lead, theorist, data_scientist, paper_reviewer]
  rounds: {min: 5, default: 5, max: 5}
  stages:
  - role: research_lead
    name: "Define the manuscript claims and structure"
    description: "Draft the scientific argument and the sections assigned to the research lead."
  - role: theorist
    name: "Write the theory"
    description: "Draft the theory section for the stated claims and method."
  - role: data_scientist
    name: "Write experiments and results"
    description: "Report the estimates, uncertainty, negative results, and limitations directly."
  - role: paper_reviewer
    name: "Read the manuscript independently"
    description: "Record a first-reader assessment using only the exact manuscript under review."
  - role: paper_reviewer
    name: "Assess the manuscript against the evidence"
    description: "Compare the preserved first reading with the internal scientific record and complete the assessment."
