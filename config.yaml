# Research Hub Configuration
# User maps one Hermes profile to each research role here.

hub:
  name: "My Research Hub"
  workspace_dir: "~/research"    # where projects + database live (separate from app)
  # projects:    ~/research/projects/project-NNN-<slug>/
  # database:    ~/research/hub.db
  run_timeout_minutes: 240   # numerical phases run real MCMC — 120m was too short
# Phase runs are explicitly started by the user. This permits the lead to
# execute the project-local tools needed by Hermes after that decision.
  allow_unattended_tools: true

# Define your agent profiles here (must already exist in Hermes)
# Stable role IDs map phase work to existing Hermes profile names.
# NOTE: model/provider live in each profile's own config.yaml, not here.
#       The Profiles page reads them from the active Hermes profile root.
#       Set RESEARCH_HUB_HERMES_ROOT to override Hermes' platform default.
agents:
- id: "research_lead"
  profile: "research_lead"
  name: "Research Lead"
  role: "scientific question, framing, synthesis"

- id: "theorist"
  profile: "theorist"
  name: "Theorist"
  role: "statistical theory, assumptions, proofs"

- id: "data_scientist"
  profile: "data_scientist"
  name: "Data Analyst"
  role: "implementation, numerical studies, data analysis"

- id: "paper_reviewer"
  profile: "paper_reviewer"
  name: "Paper Reviewer"
  role: "independent scientific assessment"

# ---------------------------------------------------------------------------
# Phase definitions
#
# The user explicitly starts every run. The research_lead then executes only
# that run's configured plan, submits a summary for review, and stops. Neither
# completion nor approval starts another phase.
#
# Fields:
#   slug: phase identifier (NN-name), used everywhere
#   name: display name
#   description: one-line summary
#   pattern: exact interaction structure for the run
#     parallel: members investigate independently, then the lead synthesizes
#     sequential: fixed ordered handoffs, with each stage reading the prior one
#     debate: independent proposals followed by configured comparison rounds
#   gated_by: recommended approved, current prerequisites. The user may proceed
#     with an explicit recorded override when one is missing or stale.
#   context_from: additional approved context to include when current. These
#     phases are useful inputs, not prerequisites.
#   folder: where this phase's run outputs are written, relative to the project
#   members: roles that may participate in the configured plan
#   rounds: allowed/default depth for parallel and debate work
#   stages: exact ordered handoffs for sequential work
#   available_run_plans: explicit Web UI plans for a phase with supported
#     user-selected variants
#
# There is no "modes" field. User direction may change the research focus, but
# it cannot add, skip, reorder, or automatically start configured phases.
# ---------------------------------------------------------------------------
phases:
- slug: "01-literature-review"
  name: "Literature Review"
  description: "Assess direct prior work, theoretical foundations, related methods,
    existing implementations, and originality"
  pattern: parallel
  gated_by: []
  folder: "references/literature-review/"
  members: [research_lead, theorist, data_scientist]
  rounds: {min: 1, default: 2, max: 5}
- slug: "02-method-development"
  name: "Method Development"
  description: "Brainstorm genuinely new ideas — new mechanisms, frameworks, or insights
    — with a unique position distinct from any existing method"
  pattern: parallel
  gated_by: ["01-literature-review"]
  folder: "ideas/"
  members: [theorist, research_lead, data_scientist]
  rounds: {min: 2, default: 2, max: 3}
- slug: "03-theoretical-justification"
  name: "Idea Evaluation"
  description: "Evaluate all Phase 2 ideas across correctness, methodological novelty,
    theoretical rigor, and computational cost, then rank them"
  pattern: debate
  gated_by: ["02-method-development"]
  folder: "draft/theory/"
  members:
  - theorist
  - research_lead
  - data_scientist
  rounds:
    min: 2
    default: 2
    max: 3
- slug: "04-numerical-validation"
  name: "Draft Assembly"
  description: "Parallel drafting: intro+method (lead), theory+proofs (theorist),
    implementation+experiments (data analyst), then lead combines into a formal draft"
  pattern: parallel
  gated_by:
  - 03-theoretical-justification
  folder: "numerical/"
  members:
  - research_lead
  - theorist
  - data_scientist
  rounds:
    min: 2
    default: 2
    max: 2
- slug: "05-data-analysis"
  name: "Review & Revision"
  description: "Paper reviewer audits the Phase 4 draft using stat-paper-reviewer;
    lead revises into final manuscript"
  pattern: sequential
  gated_by: ["04-numerical-validation"]
  folder: "draft/analysis/"
  members:
  - paper_reviewer
  - research_lead
  rounds:
    min: 2
    default: 2
    max: 2
  stages:
  - name: Review
    role: paper_reviewer
    description: Audit the complete draft — soundness, clarity, significance, 
      originality. Produce ranked revision recommendations.
  - name: Revise
    role: research_lead
    description: Address each review point, revise the draft, produce the final 
      manuscript with a revision log.

